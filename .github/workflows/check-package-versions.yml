name: Check package.json versions against latest release

on:
  pull_request:

permissions:
  contents: read

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run package version check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 在 PR 中默认把过期版本当作失败处理，以便在 PR 检查页面显示为失败，避免遗漏警告
          FAIL_ON_OUTDATED: "true"
        run: node .github/scripts/check_versions.js
