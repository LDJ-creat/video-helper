version: "3.9"

services:
  core:
    # TODO: 后续补充 Dockerfile 后启用 build
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./services/core:/app
      - ./data:/app/data
    env_file:
      - ./.env
    command: ["bash", "-lc", "python --version"]

  web:
    # TODO: 后续补充 Dockerfile 后启用 build
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./apps/web:/app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    command: ["bash", "-lc", "node --version"]
